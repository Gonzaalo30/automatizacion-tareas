name: Recopilador de Noticias para LinkedIn

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  recopilador-noticias:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests
      
      - name: 🚀 Ejecutar recopilador
        run: python scripts/recopilador_noticias_lunes.py
      
      - name: 🔧 Configurar Git
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
      
      - name: 📤 Guardar cambios
        run: |
          git add -A
          git commit -m "✅ Noticias actualizadas - $(date '+%Y-%m-%d %H:%M')" || echo "No hay cambios"
      
      - name: 🔄 Push
        run: git push origin main
      
      - name: 🎉 Completado
        run: echo "✅ Noticias recopiladas correctamente"
