name: Recopilador de Noticias para LinkedIn

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  recopilador-noticias:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar librerías
  run: |
    python -m pip install --upgrade pip
    pip install feedparser requests --retries 5
    pip list | grep feedparser
      
      - name: 🚀 Ejecutar recopilador
        run: python scripts/recopilador_noticias_lunes.py
      
     - name: ✅ Verificar archivos
  run: |
    ls -la noticias*.json 2>/dev/null || ls -la ../noticias_lunes.json 2>/dev/null || echo "Archivo creado en carpeta anterior"
  continue-on-error: true
      
      - name: 🔧 Configurar Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
    - name: 📤 Guardar cambios
  run: |
    ls -la noticias*.json || echo "No se encontraron archivos"
    git config user.email "action@github.com"
    git config user.name "GitHub Action"
    git add noticias*.json
    git commit -m "✅ Noticias actualizadas - $(date '+%Y-%m-%d %H:%M')" || echo "No hay cambios"
    git log --oneline -5

- name: 🔄 Push
  run: |
    git push origin main -v || echo "Error en push"

- name: 🎉 Completado
  run: echo "✅ Noticias recopiladas correctamente"
